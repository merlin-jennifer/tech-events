name: Update events

# When this runs:
on:
  schedule:
    - cron: "0 13 * * *"   # every day at 13:00 UTC (adjust if you like)
  workflow_dispatch: {}      # ...and whenever you click "Run workflow" manually

# Let the action write files back to your repo:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build the events page
        run: python build.py

      - name: Commit the updated page
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html events.json
          git commit -m "Update events ($(date -u +%Y-%m-%d))" || echo "No changes to commit"
          git push
